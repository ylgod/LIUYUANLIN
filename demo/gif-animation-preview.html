<!doctype html>
<html>
<head>
<meta charset="utf-8">
    <title>模拟GIF动画上传成静态图片并可控制播放与暂停</title>
    <script src="https://libs.baidu.com/jquery/1.10.2/jquery.min.js"></script>
    <style>
	ins.play-gif{
		box-sizing:border-box;
		position:absolute;
		top:50%;
		margin-top:-20px;
		left:50%;
		margin-left:-20px;
		min-height:40px;
		min-width:40px;
		text-align:center;
		background:#222;
		line-height:34px;
		font-size:14px;
		text-transform:uppercase;
		color:#fff;
		border-radius:50%;
		opacity:.9;
		border:3px solid #fff;
		cursor:pointer;
		text-decoration:none;
	}
	ins.play-gif:hover{
		opacity:.5;
	}
	.gifWrap{
		position:relative;
		display:inline-block;
	}
    </style>
</head>
<body>
	<h3>GIF动画上传成静态图片并可鼠标经过播放与暂停</h3>

	<img src="https://hilau.com/wp-content/uploads/2019/09/canvas.gif" />
</body>
<script>
	function isAssetTypeAnImage(ext) {
	  return ['gif'].indexOf(ext.toLowerCase()) !== -1;
	}
	$('img').each(function(){
		var gifPath = $(this)[0].src;
		var	gifIndex = gifPath.lastIndexOf(".");
		var	gifExt = gifPath.substr(gifIndex+1);
			if (isAssetTypeAnImage(gifExt)) {
				$(this).wrap("<div class='gifWrap'></div>").parent();
				$(this).after('<ins class="play-gif">gif</ins>');
				$(this).addClass('gif');
			}
	}); 
	
	//dataURLtoBlob("a.gif");
    // base64 转 blob
    function dataURLtoBlob(dataurl) {
        var arr = dataurl.split(','),
            mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]),
            n = bstr.length,
            u8arr = new Uint8Array(n);
        while (n--) {
            u8arr[n] = bstr.charCodeAt(n);
        }
        return new Blob([u8arr], {
            type: mime
        });
    }

    // 动态图片转静态
    function aniToReview(e){
        $(e).each(function () {
            var canvas = document.createElement('canvas'),
                ctx = canvas.getContext("2d"),
                base64 = '',
                aniUrl = this.src;
				canvas.setAttribute('crossOrigin', 'anonymous');
            $(this).one('load', function () {
                canvas.width = this.width;
                canvas.height = this.height;
                ctx.drawImage(this, 0, 0, canvas.width, canvas.height);
                base64 = canvas.toDataURL("image/png");
                var reviewUrl = URL.createObjectURL(dataURLtoBlob(base64))
                $(this).attr({
                    'src': reviewUrl,
                    'realsrc': aniUrl
                });
            });
        })
    }
	aniToReview('.gif');
    // 鼠标经过时静态图片转动态
    $(document).on('mouseover','.gif',function () {
        var reviewImg = $(this).attr('src'),
            aniImg = $(this).attr('realsrc');
        $(this).attr({'src': aniImg, 'realsrc': reviewImg});
		$('.play-gif').fadeOut(100);
    })
    $(document).on('mouseout','.gif',function () {
        var reviewImg = $(this).attr('realsrc'),
            aniImg = $(this).attr('src');
        $(this).attr({'src': reviewImg, 'realsrc': aniImg});
		$('.play-gif').fadeIn(100);
    })

</script>
</html>
